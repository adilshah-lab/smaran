# ================= SERVER =================
PORT=10000   # (Render auto sets this, no need to manually add)

# ================= DATABASE =================
SPRING_DATASOURCE_URL=jdbc:postgresql://<host>:5432/postgres?sslmode=require
SPRING_DATASOURCE_USERNAME=your_db_username
SPRING_DATASOURCE_PASSWORD=your_db_password
SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver

# ================= HIKARI =================
SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5
SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=1
SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT=30000
SPRING_DATASOURCE_HIKARI_MAX_LIFETIME=60000
SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=30000
SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=60000

# ================= JPA =================
SPRING_JPA_HIBERNATE_DDL_AUTO=none
SPRING_JPA_SHOW_SQL=true
SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true

# ================= SUPABASE =================
SUPABASE_PROJECT_ID=your_project_id
SUPABASE_JWKS_URL=your_jwks_url

# ================= CLAUDE =================
CLAUDE_API_KEY=your_api_key
CLAUDE_API_URL=https://api.anthropic.com/v1/messages
CLAUDE_MODEL=claude-3-haiku-20240307

# ================= JWT =================
JWT_SECRET=THIS_IS_A_VERY_LONG_SECRET_KEY_CHANGE_IT
JWT_EXPIRATION=604800000

# ================= LOGGING =================
LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CORE_ENV=DEBUG